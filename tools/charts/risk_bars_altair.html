<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.1.0"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"strokeWidth": 0}, "axis": {"labelFontSize": 12, "titleFontSize": 13, "titleFontWeight": "normal", "gridColor": "#E5E7EB", "domainColor": "#9CA3AF"}, "legend": {"labelFontSize": 11, "titleFontSize": 12}, "title": {"fontSize": 16, "fontWeight": "bold", "anchor": "start", "offset": 10}, "mark": {"opacity": 0.85}}, "layer": [{"mark": {"type": "bar", "cornerRadiusEnd": 4, "height": 25}, "encoding": {"color": {"field": "risk", "scale": {"domain": ["Low Risk", "Medium Risk", "High Risk"], "range": ["#16A34A", "#D97706", "#DC2626"]}, "title": "Risk Level", "type": "nominal"}, "tooltip": [{"field": "factor", "title": "Factor", "type": "nominal"}, {"field": "score", "format": ".0f", "title": "Score", "type": "quantitative"}, {"field": "risk", "title": "Risk Level", "type": "nominal"}], "x": {"field": "score", "scale": {"domain": [0, 100]}, "title": "Score (%)", "type": "quantitative"}, "y": {"field": "factor", "sort": {"field": "score", "order": "ascending"}, "title": null, "type": "nominal"}}, "title": "Test Risk"}, {"mark": {"type": "text", "align": "left", "dx": 5, "fontSize": 12, "fontWeight": "bold"}, "encoding": {"color": {"value": "#374151"}, "text": {"field": "score", "format": ".0f", "type": "quantitative"}, "x": {"field": "score", "type": "quantitative"}, "y": {"field": "factor", "sort": {"field": "score", "order": "ascending"}, "type": "nominal"}}}], "data": {"name": "data-8c32ff47feb2fb07b9d96df9339a0d1a"}, "height": {"step": 40}, "width": 500, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-8c32ff47feb2fb07b9d96df9339a0d1a": [{"factor": "Study Progress", "score": 40.0, "risk": "High Risk", "color": "#DC2626"}, {"factor": "Developer", "score": 75.0, "risk": "Low Risk", "color": "#16A34A"}, {"factor": "Queue Position", "score": 80.0, "risk": "Low Risk", "color": "#16A34A"}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
